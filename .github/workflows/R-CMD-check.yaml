# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main]
  workflow_dispatch:

name: "R CMD check (full)"

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest, r: "release" }
          - { os: ubuntu-latest, r: "release" }
          # r cmd build apparently fails to install the package - no errors or warnings
          # only becomes evident when trying to build vignette
          # pak not installing system dependencies?
          # - { os: windows-latest, r: "release" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: false

      - name: Resolve macOS dependency versions
        if: runner.os == 'macos'
        run: |
          brew update
          brew info --json gdal proj | jq -r '.[].versions.stable' > brew-versions.txt

      - name: Cache macOS system dependencies
        if: runner.os == 'macos'
        id: cache-brew
        uses: actions/cache@v4
        with:
          path: |
            /opt/homebrew/Cellar/gdal
            /opt/homebrew/Cellar/proj
            /usr/local/Cellar/gdal
            /usr/local/Cellar/proj
          key: ${{ runner.os }}-brew-gdal-proj-${{ hashFiles('brew-versions.txt') }}

      - name: Install or link macOS dependencies
        if: runner.os == 'macos'
        run: |
          if [ "${{ steps.cache-brew.outputs.cache-hit }}" == "true" ]; then
            brew link gdal proj
          else
            brew install gdal proj
          fi

      - name: Resolve Ubuntu dependency versions
        if: runner.os == 'linux'
        run: |
          sudo apt-get update
          apt-cache policy libgdal-dev libproj-dev | grep Candidate > apt-versions.txt

      - name: Cache Ubuntu system dependencies
        if: runner.os == 'linux'
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-gdal-proj-${{ hashFiles('apt-versions.txt') }}

      - name: Install Ubuntu dependencies
        if: runner.os == 'linux'
        run: sudo apt-get install -y libgdal-dev libproj-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
